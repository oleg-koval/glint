<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">glint — a status line for Claude Code</title>
  <desc id="d">glint shows model, git, cost and a live context gauge in one terminal line.</desc>
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#72c585"/>
      <stop offset="60%" stop-color="#e6c14b"/>
      <stop offset="100%" stop-color="#e08a7a"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace; }
      .ui   { font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="0" y="0" width="1200" height="630" fill="#0d1117"/>
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#1f2937" stroke-width="2"/>

  <!-- spark mark -->
  <g transform="translate(96,104)" stroke="#e6826f" stroke-width="13" stroke-linecap="round">
    <line x1="34" y1="0" x2="34" y2="68"/>
    <line x1="4" y1="17" x2="64" y2="51"/>
    <line x1="64" y1="17" x2="4" y2="51"/>
  </g>
  <circle cx="130" cy="138" r="11" fill="#f0a08f"/>

  <!-- wordmark + tagline -->
  <text x="190" y="150" class="ui" font-size="86" font-weight="800" fill="#f3f4f6">glint</text>
  <text x="98" y="232" class="ui" font-size="34" font-weight="600" fill="#cbd5e1">A rich, fast, fail-safe status line for Claude Code.</text>
  <text x="98" y="280" class="ui" font-size="26" fill="#8b97a7">Your whole session at a glance — with a live context gauge.</text>

  <!-- terminal mock of the real status line -->
  <rect x="98" y="330" width="1004" height="118" rx="16" fill="#0b0f16" stroke="#1f2937" stroke-width="2"/>
  <g class="mono" font-size="27" font-weight="700">
    <text x="128" y="382" fill="#e6826f">✻ Sonnet 4.6</text>
    <text x="356" y="382" fill="#7fb5e6">📁 my-repo</text>
    <text x="556" y="382" fill="#72c585">🌿 main</text>
    <text x="556" y="382" fill="#72c585" opacity="0"> </text>
    <text x="688" y="382" fill="#e6c14b">💰 $0.42</text>
    <text x="858" y="382" fill="#72c585">🧠 36%</text>
  </g>
  <!-- gauge inside the mock -->
  <rect x="128" y="404" width="320" height="20" rx="10" fill="#1c2533"/>
  <rect x="128" y="404" width="116" height="20" rx="10" fill="url(#bar)"/>
  <text x="466" y="421" class="mono" font-size="22" fill="#8b97a7">357k / 1.0M tokens</text>

  <!-- feature chips -->
  <g class="ui" font-size="24" font-weight="600" fill="#cbd5e1">
    <g>
      <rect x="98" y="496" width="232" height="56" rx="28" fill="#141b26" stroke="#26303f" stroke-width="2"/>
      <text x="130" y="532" fill="#9fb0c2">live context gauge</text>
    </g>
    <g>
      <rect x="350" y="496" width="150" height="56" rx="28" fill="#141b26" stroke="#26303f" stroke-width="2"/>
      <text x="382" y="532" fill="#9fb0c2">git state</text>
    </g>
    <g>
      <rect x="520" y="496" width="196" height="56" rx="28" fill="#141b26" stroke="#26303f" stroke-width="2"/>
      <text x="552" y="532" fill="#9fb0c2">cost &amp; lines</text>
    </g>
    <g>
      <rect x="736" y="496" width="180" height="56" rx="28" fill="#141b26" stroke="#26303f" stroke-width="2"/>
      <text x="768" y="532" fill="#9fb0c2">zero deps</text>
    </g>
  </g>

  <!-- footer handle -->
  <text x="98" y="600" class="mono" font-size="22" fill="#5b6675">github.com/oleg-koval/glint</text>
  <text x="1102" y="600" class="mono" font-size="22" fill="#5b6675" text-anchor="end">one file · MIT</text>
</svg>
