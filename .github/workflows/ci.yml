name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'assets/**']
  pull_request:
    paths-ignore: ['**.md', 'assets/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.8', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Smoke + unit tests
        run: python3 test_glint.py
      - name: Byte-compile check
        run: python3 -m py_compile glint.py
